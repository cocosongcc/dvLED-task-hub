    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>dvLED Task Tracking Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>

<div id="root"></div>

<script>
const firebaseConfig = {
    apiKey:            "AIzaSyAhIDyqik-pHQm65kYV3jqS0iFzhZZpb5U",
    authDomain:        "asti-task-tracking.firebaseapp.com",
    projectId:         "asti-task-tracking",
    storageBucket:     "asti-task-tracking.firebasestorage.app",
    messagingSenderId: "488004891685",
    appId:             "1:488004891685:web:c876b47b6066786b1f7bcc",
    measurementId:     "G-EN3FQJHF3T"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
</script>

<script type="text/babel">
const { useState, useEffect, useMemo, useRef } = React;

const Icon = ({ name, size = 18, className = "" }) => {
    useEffect(() => { if (window.lucide) window.lucide.createIcons(); }, [name]);
    return <i data-lucide={name} style={{ width: size, height: size }} className={className}></i>;
};

const STATUS_OPTIONS = {
    '未開始': { color: 'bg-slate-100 text-slate-600',    icon: 'circle' },
    '進行中': { color: 'bg-amber-100 text-amber-700',     icon: 'clock' },
    '待審核': { color: 'bg-blue-100 text-blue-700',       icon: 'search' },
    '已完成': { color: 'bg-emerald-100 text-emerald-700', icon: 'check-circle-2' },
    '延遲':   { color: 'bg-rose-100 text-rose-700',       icon: 'alert-circle' },
};

const DEFAULT_PROJECTS = ['官網重建專案','dvLED 展示牆','會議室 AV 整合','展覽攤位 LED','總部大廳顯示牆'];

// ── 原始資料（第一次開啟時自動寫入 Firebase）──
const SEED = [
    {id:'s1', taskNo:'1001',client:'台灣銀行',  project:'官網重建專案',   task:'需求訪談 & 規格確認',  assignedDate:'2026-03-25',owner:'王小明',status:'已完成',dueDate:'2026-03-28',remarks:'',         createdAt:1},
    {id:'s2', taskNo:'1002',client:'台灣銀行',  project:'官網重建專案',   task:'UI 線框稿設計',       assignedDate:'2026-03-28',owner:'陳美麗',status:'進行中',dueDate:'2026-04-10',remarks:'',         createdAt:2},
    {id:'s3', taskNo:'1003',client:'台灣銀行',  project:'官網重建專案',   task:'後端 API 開發',       assignedDate:'2026-04-01',owner:'李大偉',status:'未開始',dueDate:'2026-04-25',remarks:'',         createdAt:3},
    {id:'s4', taskNo:'1004',client:'遠傳電信',  project:'dvLED 展示牆',  task:'現場勘查 & 丈量',     assignedDate:'2026-03-20',owner:'張志豪',status:'已完成',dueDate:'2026-03-21',remarks:'',         createdAt:4},
    {id:'s5', taskNo:'1005',client:'遠傳電信',  project:'dvLED 展示牆',  task:'BOM 報價製作',        assignedDate:'2026-03-22',owner:'王小明',status:'已完成',dueDate:'2026-03-24',remarks:'',         createdAt:5},
    {id:'s6', taskNo:'1006',client:'遠傳電信',  project:'dvLED 展示牆',  task:'採購詢價 & 下單',     assignedDate:'2026-03-25',owner:'陳美麗',status:'進行中',dueDate:'2026-04-05',remarks:'等待廠商報價',createdAt:6},
    {id:'s7', taskNo:'1007',client:'遠傳電信',  project:'dvLED 展示牆',  task:'到貨驗收',            assignedDate:'2026-04-06',owner:'李大偉',status:'未開始',dueDate:'2026-04-20',remarks:'',         createdAt:7},
    {id:'s8', taskNo:'1008',client:'台積電',    project:'會議室 AV 整合', task:'工程設計圖繪製',      assignedDate:'2026-03-30',owner:'張志豪',status:'進行中',dueDate:'2026-04-08',remarks:'',         createdAt:8},
    {id:'s9', taskNo:'1009',client:'台積電',    project:'會議室 AV 整合', task:'設備規格文件準備',    assignedDate:'2026-04-01',owner:'王小明',status:'待審核',dueDate:'2026-04-07',remarks:'待客戶確認', createdAt:9},
    {id:'s10',taskNo:'1010',client:'台積電',    project:'會議室 AV 整合', task:'安裝施工',            assignedDate:'2026-04-10',owner:'陳美麗',status:'未開始',dueDate:'2026-04-22',remarks:'',         createdAt:10},
    {id:'s11',taskNo:'1011',client:'聯發科',    project:'展覽攤位 LED',  task:'展覽需求確認',        assignedDate:'2026-04-01',owner:'李大偉',status:'進行中',dueDate:'2026-04-04',remarks:'',         createdAt:11},
    {id:'s12',taskNo:'1012',client:'聯發科',    project:'展覽攤位 LED',  task:'設備進場規劃',        assignedDate:'2026-04-03',owner:'張志豪',status:'未開始',dueDate:'2026-04-18',remarks:'',         createdAt:12},
    {id:'s13',taskNo:'1013',client:'鴻海集團',  project:'總部大廳顯示牆', task:'提案簡報製作',        assignedDate:'2026-04-02',owner:'王小明',status:'延遲',  dueDate:'2026-03-31',remarks:'客戶未回覆', createdAt:13},
];

function App() {
    const [tasks, setTasks]           = useState([]);
    const [isLoading, setIsLoading]   = useState(true);
    const [syncStatus, setSyncStatus] = useState('連線中...');
    const [isModalOpen, setIsModalOpen] = useState(false);
    const [editingId, setEditingId]   = useState(null);
    const [searchTerm, setSearchTerm] = useState('');
    const [filterStatus, setFilterStatus]   = useState([]);
    const [filterClient, setFilterClient]   = useState('All');
    const [filterProject, setFilterProject] = useState('All');
    const [filterOwner, setFilterOwner]     = useState('All');
    const fileInputRef  = useRef(null);
    const attachmentRef = useRef(null);

    const today = new Date().toISOString().split('T')[0];
    const initialForm = {
        client:'', project:'', task:'', assignedDate:today,
        owner:'', status:'未開始', dueDate:'', remarks:'', files:[]
    };
    const [form, setForm] = useState(initialForm);

    // ── Firebase: 啟動時確認資料、開啟即時監聽 ──
    useEffect(() => {
        const col = db.collection('tasks');

        // 若 Firebase 是空的，寫入 SEED 資料
        col.limit(1).get().then(snap => {
            if (snap.empty) {
                const batch = db.batch();
                SEED.forEach(({ id, ...data }) => {
                    batch.set(col.doc(id), data);
                });
                batch.commit();
            }
        }).catch(err => {
            console.error('Firebase 連線失敗:', err);
            setSyncStatus('⚠ 連線失敗，請確認 Firebase 設定');
        });

        // 即時監聽（所有同事的異動都會推送過來）
        const unsubscribe = col.orderBy('createdAt', 'asc').onSnapshot(
            snapshot => {
                setTasks(snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() })));
                setIsLoading(false);
                setSyncStatus('雲端同步 ✓');
            },
            error => {
                console.error(error);
                setSyncStatus('⚠ 連線中斷');
                setIsLoading(false);
            }
        );

        return () => unsubscribe(); // 離開頁面時取消監聽
    }, []);

    const uniqueClients  = useMemo(() => [...new Set(tasks.map(t=>t.client))].filter(Boolean).sort(), [tasks]);
    const uniqueProjects = useMemo(() => [...new Set([...DEFAULT_PROJECTS,...tasks.map(t=>t.project)])].filter(Boolean).sort(), [tasks]);
    const uniqueOwners   = useMemo(() => [...new Set(tasks.map(t=>t.owner))].filter(Boolean).sort(), [tasks]);

    const handleFileUpload = (e) => {
        const file = e.target.files[0];
        if (!file) return;
        if (file.size > 500 * 1024) { alert('附件需小於 500KB（Firebase 文件限制）'); return; }
        const reader = new FileReader();
        reader.onload = ev => {
            setForm(prev => ({
                ...prev,
                files: [...(prev.files||[]), { id: crypto.randomUUID(), name: file.name, type: file.type, size: file.size, data: ev.target.result }]
            }));
        };
        reader.readAsDataURL(file);
        e.target.value = null;
    };

    const handleEdit = (t) => {
        setEditingId(t.id);
        setForm({
            client: t.client||'', project: t.project||'', task: t.task||'',
            assignedDate: t.assignedDate||today, owner: t.owner||'',
            status: t.status||'未開始', dueDate: t.dueDate||'',
            remarks: t.remarks||'', files: t.files||[]
        });
        setIsModalOpen(true);
    };

    const handleSubmit = async (e) => {
        e.preventDefault();
        const col = db.collection('tasks');
        if (editingId) {
            await col.doc(editingId).update({ ...form, lastEditedAt: Date.now() });
        } else {
            const nextNo = tasks.length > 0 ? Math.max(...tasks.map(t => parseInt(t.taskNo)||0)) + 1 : 1001;
            await col.add({ ...form, taskNo: String(nextNo), createdAt: Date.now() });
        }
        setIsModalOpen(false);
        setEditingId(null);
        setForm(initialForm);
    };

    const handleDelete = async (id) => {
        if (confirm('確定刪除此任務？刪除後無法復原。')) {
            await db.collection('tasks').doc(id).delete();
        }
    };

    const handleStatusChange = async (id, newStatus) => {
        await db.collection('tasks').doc(id).update({ status: newStatus });
    };

    const exportCsv = () => {
        if (!tasks.length) return;
        const h = ['No','客戶名','專案名','工作內容','指派時間','負責人員','狀態','預計結束','備註','附件數'];
        const rows = tasks.map(t => [
            t.taskNo, t.client, t.project, `"${t.task}"`,
            t.assignedDate, t.owner, t.status, t.dueDate,
            `"${t.remarks||''}"`, (t.files||[]).length
        ]);
        const csv = '﻿' + h.join(',') + '\n' + rows.map(r => r.join(',')).join('\n');
        const a = document.createElement('a');
        a.href = 'data:text/csv;charset=utf-8,' + encodeURIComponent(csv);
        a.download = `tasks_${today}.csv`;
        a.click();
    };

    const exportJson = () => {
        const a = document.createElement('a');
        a.href = 'data:application/json;charset=utf-8,' + encodeURIComponent(JSON.stringify(tasks, null, 2));
        a.download = `tasks_backup_${today}.json`;
        a.click();
    };

    const importJson = async (e) => {
        const file = e.target.files[0]; if (!file) return;
        const reader = new FileReader();
        reader.onload = async ev => {
            try {
                const d = JSON.parse(ev.target.result);
                if (Array.isArray(d) && confirm(`載入 ${d.length} 筆到 Firebase？資料將新增到現有清單。`)) {
                    const col = db.collection('tasks');
                    const batch = db.batch();
                    d.forEach(({ id, ...data }) => {
                        batch.set(col.doc(), { ...data, createdAt: data.createdAt || Date.now() });
                    });
                    await batch.commit();
                }
            } catch { alert('格式錯誤，請選擇正確的 JSON 備份檔'); }
        };
        reader.readAsText(file);
        e.target.value = null;
    };

    const downloadFile = (f) => { const a = document.createElement('a'); a.href = f.data; a.download = f.name; a.click(); };

    const filtered = tasks.filter(t => {
        const q = searchTerm.toLowerCase();
        return (!q || [t.client, t.project, t.task, t.owner, t.remarks, t.taskNo].some(v => (v||'').toLowerCase().includes(q)))
            && (filterStatus.length === 0 || filterStatus.includes(t.status))
            && (filterClient  === 'All' || t.client  === filterClient)
            && (filterProject === 'All' || t.project === filterProject)
            && (filterOwner   === 'All' || t.owner   === filterOwner);
    });

    const kpiTotal   = tasks.length;
    const kpiInProg  = tasks.filter(t => t.status === '進行中').length;
    const kpiDone    = tasks.filter(t => t.status === '已完成').length;
    const kpiDelayed = tasks.filter(t => t.status === '延遲').length;

    // ── 載入畫面 ──
    if (isLoading) return (
        <div className="min-h-screen flex items-center justify-center bg-slate-50">
            <div className="text-center">
                <div className="w-14 h-14 border-4 border-indigo-600 border-t-transparent rounded-full animate-spin mx-auto mb-5"></div>
                <p className="text-slate-600 font-bold text-lg">連線到 Firebase...</p>
                <p className="text-slate-400 text-sm mt-1">正在載入雲端資料</p>
            </div>
        </div>
    );

    return (
        <div className="min-h-screen pb-20">

            {/* ── Header ── */}
            <header className="bg-white border-b border-slate-200 sticky top-0 z-10 shadow-sm px-6 py-4">
                <div className="max-w-7xl mx-auto flex justify-between items-center">
                    <div className="flex items-center space-x-3">
                        <div className="bg-indigo-600 p-2 rounded-xl text-white shadow-lg shadow-indigo-100">
                            <Icon name="monitor" />
                        </div>
                        <div>
                            <h1 className="text-xl font-bold text-slate-800 tracking-tight">dvLED Task Tracking Hub</h1>
                            <p className="text-[10px] font-bold uppercase tracking-widest flex items-center gap-1"
                               style={{color: syncStatus.includes('✓') ? '#10b981' : syncStatus.includes('⚠') ? '#ef4444' : '#94a3b8'}}>
                                <Icon name={syncStatus.includes('✓') ? 'cloud' : syncStatus.includes('⚠') ? 'cloud-off' : 'loader'} size={10} />
                                {syncStatus}
                            </p>
                        </div>
                    </div>
                    <div className="flex items-center space-x-2">
                        <button onClick={exportJson} className="hidden md:flex items-center space-x-2 border border-slate-200 px-4 py-2 rounded-xl text-sm font-semibold hover:bg-slate-50 transition-all shadow-sm">
                            <Icon name="code" size={16}/><span className="text-slate-600">JSON 備份</span>
                        </button>
                        <button onClick={exportCsv} className="hidden md:flex items-center space-x-2 border border-emerald-200 bg-emerald-50 text-emerald-700 px-4 py-2 rounded-xl text-sm font-semibold hover:bg-emerald-100 transition-all shadow-sm">
                            <Icon name="file-spreadsheet" size={16}/><span>匯出 CSV</span>
                        </button>
                        <button onClick={() => fileInputRef.current.click()} className="hidden md:flex items-center space-x-2 border border-slate-200 px-4 py-2 rounded-xl text-sm font-semibold hover:bg-slate-50 transition-all shadow-sm">
                            <Icon name="upload" size={16}/><span className="text-slate-600">匯入 JSON</span>
                        </button>
                        <input type="file" ref={fileInputRef} onChange={importJson} className="hidden" accept=".json" />
                        <button
                            onClick={() => { setEditingId(null); setForm(initialForm); setIsModalOpen(true); }}
                            className="bg-indigo-600 text-white px-5 py-2.5 rounded-xl font-bold text-sm shadow-md hover:bg-indigo-700 active:scale-95 transition-all ml-2"
                        >
                            <Icon name="plus" size={18} className="inline mr-1"/>新增任務
                        </button>
                    </div>
                </div>
            </header>

            <main className="max-w-7xl mx-auto px-6 py-8">

                {/* ── KPI 卡片 ── */}
                <div className="grid grid-cols-2 md:grid-cols-4 gap-4 mb-8">
                    {[
                        {label:'總任務', val:kpiTotal,   color:'border-indigo-500', num:'text-indigo-600'},
                        {label:'進行中', val:kpiInProg,  color:'border-amber-400',  num:'text-amber-600'},
                        {label:'已完成', val:kpiDone,    color:'border-emerald-500',num:'text-emerald-600'},
                        {label:'延遲',   val:kpiDelayed, color:'border-rose-500',   num:'text-rose-600'},
                    ].map(k => (
                        <div key={k.label} className={`bg-white rounded-2xl shadow-sm border-t-4 ${k.color} px-6 py-4`}>
                            <div className={`text-3xl font-black ${k.num}`}>{k.val}</div>
                            <div className="text-xs text-slate-400 font-bold uppercase tracking-wider mt-1">{k.label}</div>
                        </div>
                    ))}
                </div>

                {/* ── 篩選列 ── */}
                <div className="grid grid-cols-1 md:grid-cols-5 gap-4 mb-6">
                    <div className="relative group md:col-span-1">
                        <div className="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 group-focus-within:text-indigo-500 transition-colors"><Icon name="search" size={16}/></div>
                        <input type="text" placeholder="搜尋任務…" className="w-full pl-10 pr-4 py-3 bg-white border border-slate-200 rounded-2xl focus:ring-4 focus:ring-indigo-100 outline-none text-sm shadow-sm" value={searchTerm} onChange={e => setSearchTerm(e.target.value)} />
                    </div>
                    <div className="flex flex-col space-y-1">
                        <label className="text-[10px] font-bold text-slate-400 uppercase ml-2">客戶名</label>
                        <select value={filterClient} onChange={e => setFilterClient(e.target.value)} className="w-full px-4 py-3 bg-white border border-slate-200 rounded-2xl focus:ring-4 focus:ring-indigo-100 outline-none text-sm shadow-sm">
                            <option value="All">全部客戶</option>
                            {uniqueClients.map(c => <option key={c} value={c}>{c}</option>)}
                        </select>
                    </div>
                    <div className="flex flex-col space-y-1">
                        <label className="text-[10px] font-bold text-slate-400 uppercase ml-2">專案名</label>
                        <select value={filterProject} onChange={e => setFilterProject(e.target.value)} className="w-full px-4 py-3 bg-white border border-slate-200 rounded-2xl focus:ring-4 focus:ring-indigo-100 outline-none text-sm shadow-sm">
                            <option value="All">全部專案</option>
                            {uniqueProjects.map(p => <option key={p} value={p}>{p}</option>)}
                        </select>
                    </div>
                    <div className="flex flex-col space-y-1">
                        <label className="text-[10px] font-bold text-slate-400 uppercase ml-2">負責人員</label>
                        <select value={filterOwner} onChange={e => setFilterOwner(e.target.value)} className="w-full px-4 py-3 bg-white border border-slate-200 rounded-2xl focus:ring-4 focus:ring-indigo-100 outline-none text-sm shadow-sm">
                            <option value="All">全部人員</option>
                            {uniqueOwners.map(o => <option key={o} value={o}>{o}</option>)}
                        </select>
                    </div>
                    <div className="flex flex-col space-y-1">
                        <label className="text-[10px] font-bold text-slate-400 uppercase ml-2">狀態（可多選）</label>
                        <div className="flex bg-white border border-slate-200 rounded-2xl p-1 shadow-sm h-[46px] gap-0.5">
                            <button
                                onClick={() => setFilterStatus([])}
                                className={'flex-1 rounded-xl text-[9px] font-black transition-all ' + (filterStatus.length === 0 ? 'bg-indigo-600 text-white shadow-md' : 'text-slate-500 hover:bg-slate-50')}>
                                全部
                            </button>
                            {Object.keys(STATUS_OPTIONS).map(s => (
                                <button key={s}
                                    onClick={() => setFilterStatus(prev => prev.includes(s) ? prev.filter(x => x !== s) : [...prev, s])}
                                    className={'flex-1 rounded-xl text-[9px] font-black transition-all ' + (filterStatus.includes(s) ? 'bg-indigo-600 text-white shadow-md' : 'text-slate-500 hover:bg-slate-50')}>
                                    {s}
                                </button>
                            ))}
                        </div>
                    </div>
                </div>

                {/* ── 表格 ── */}
                <div className="bg-white rounded-[2rem] shadow-xl shadow-slate-200/40 border border-slate-200 overflow-hidden">
                    <table className="w-full text-left border-collapse">
                        <thead>
                            <tr className="bg-slate-50 border-b border-slate-200 text-slate-400 text-[11px] font-bold uppercase tracking-wider">
                                <th className="px-5 py-5">No.</th>
                                <th className="px-5 py-5">客戶名</th>
                                <th className="px-5 py-5">專案名</th>
                                <th className="px-5 py-5">工作內容</th>
                                <th className="px-5 py-5">指派時間</th>
                                <th className="px-5 py-5">負責人員</th>
                                <th className="px-5 py-5">狀態</th>
                                <th className="px-5 py-5">預計結束</th>
                                <th className="px-5 py-5 text-right">操作</th>
                            </tr>
                        </thead>
                        <tbody className="divide-y divide-slate-100">
                            {filtered.length === 0 ? (
                                <tr><td colSpan="9" className="px-6 py-20 text-center text-slate-400">找不到符合條件的任務。</td></tr>
                            ) : filtered.map(t => {
                                const isOverdue = t.dueDate && new Date(t.dueDate) < new Date() && t.status !== '已完成';
                                return (
                                    <tr key={t.id} className="hover:bg-slate-50/80 transition-all group">
                                        <td className="px-5 py-5 font-mono text-[12px] text-slate-400">#{t.taskNo}</td>
                                        <td className="px-5 py-5 font-bold text-slate-800 text-sm whitespace-nowrap">{t.client}</td>
                                        <td className="px-5 py-5">
                                            <span className="text-[10px] px-2.5 py-1 bg-white border border-slate-200 text-slate-500 rounded-lg font-black uppercase tracking-tight shadow-sm whitespace-nowrap">{t.project}</span>
                                        </td>
                                        <td className="px-5 py-5 max-w-[220px]">
                                            <div className="flex flex-col gap-1">
                                                <p className="text-sm text-slate-600 leading-relaxed line-clamp-2">{t.task}</p>
                                                {t.remarks && <p className="text-[10px] text-indigo-400 font-medium italic line-clamp-1">{t.remarks}</p>}
                                                {t.files && t.files.length > 0 && (
                                                    <div className="flex items-center text-[10px] text-emerald-500 font-bold">
                                                        <Icon name="paperclip" size={10} className="mr-0.5"/>{t.files.length} 個附件
                                                    </div>
                                                )}
                                            </div>
                                        </td>
                                        <td className="px-5 py-5 text-xs font-medium text-slate-500 whitespace-nowrap">
                                            <div className="flex items-center gap-1.5"><Icon name="calendar-plus" size={12}/>{t.assignedDate || '—'}</div>
                                        </td>
                                        <td className="px-5 py-5 text-sm font-bold text-slate-700 whitespace-nowrap">{t.owner}</td>
                                        <td className="px-5 py-5">
                                            <select
                                                value={t.status}
                                                onChange={e => handleStatusChange(t.id, e.target.value)}
                                                className={`appearance-none px-3 py-1.5 rounded-xl text-[11px] font-black border-none cursor-pointer focus:ring-4 focus:ring-indigo-100 transition-all ${STATUS_OPTIONS[t.status]?.color || 'bg-slate-100 text-slate-600'}`}
                                            >
                                                {Object.keys(STATUS_OPTIONS).map(s => <option key={s} value={s}>{s}</option>)}
                                            </select>
                                        </td>
                                        <td className={`px-5 py-5 text-xs font-medium whitespace-nowrap ${isOverdue ? 'text-rose-500 font-bold' : 'text-slate-500'}`}>
                                            <div className="flex items-center gap-1.5">
                                                <Icon name={isOverdue ? "alert-triangle" : "calendar"} size={12}/>
                                                {t.dueDate || '—'}
                                            </div>
                                        </td>
                                        <td className="px-5 py-5 text-right">
                                            <div className="flex justify-end gap-1 opacity-0 group-hover:opacity-100 transition-opacity">
                                                {t.files && t.files.length > 0 && (
                                                    <div className="relative group/files">
                                                        <button className="text-emerald-500 hover:bg-emerald-50 transition-all p-2 rounded-xl"><Icon name="file-down" size={16}/></button>
                                                        <div className="absolute right-0 bottom-full mb-2 w-48 bg-white rounded-xl shadow-xl border border-slate-100 hidden group-hover/files:block z-20 p-2">
                                                            <p className="text-[10px] font-bold text-slate-400 px-2 py-1 uppercase">附件</p>
                                                            {t.files.map(f => (
                                                                <button key={f.id} onClick={() => downloadFile(f)} className="w-full text-left px-2 py-1.5 text-xs text-slate-600 hover:bg-slate-50 rounded-lg flex items-center justify-between">
                                                                    <span className="truncate mr-2">{f.name}</span><Icon name="download" size={12}/>
                                                                </button>
                                                            ))}
                                                        </div>
                                                    </div>
                                                )}
                                                <button onClick={() => handleEdit(t)} className="text-slate-400 hover:text-indigo-600 transition-all p-2 rounded-xl hover:bg-indigo-50"><Icon name="edit-2" size={16}/></button>
                                                <button onClick={() => handleDelete(t.id)} className="text-slate-400 hover:text-rose-500 transition-all p-2 rounded-xl hover:bg-rose-50"><Icon name="trash-2" size={16}/></button>
                                            </div>
                                        </td>
                                    </tr>
                                );
                            })}
                        </tbody>
                    </table>
                    <div className="px-6 py-3 border-t border-slate-100 text-right text-xs text-slate-400 font-medium">
                        顯示 {filtered.length} / {tasks.length} 筆 · 即時同步中
                    </div>
                </div>
            </main>

            {/* ── Modal ── */}
            {isModalOpen && (
                <div className="fixed inset-0 bg-slate-900/70 backdrop-blur-md flex items-center justify-center z-50 p-4">
                    <div className="bg-white rounded-[2.5rem] w-full max-w-xl shadow-2xl overflow-hidden border border-white/20">
                        <div className="px-10 py-7 border-b border-slate-100 flex justify-between items-center bg-slate-50/50">
                            <div>
                                <h2 className="text-2xl font-black text-slate-800 tracking-tight">{editingId ? '編輯任務' : '新增任務'}</h2>
                                <p className="text-xs text-slate-400 font-medium mt-1">{editingId ? `修改 #${tasks.find(t => t.id === editingId)?.taskNo}` : '填寫任務資訊並追蹤進度'}</p>
                            </div>
                            <button onClick={() => { setIsModalOpen(false); setEditingId(null); setForm(initialForm); }} className="bg-white p-2.5 rounded-2xl text-slate-400 hover:text-slate-600 transition shadow-sm border border-slate-100"><Icon name="x" size={20}/></button>
                        </div>
                        <form onSubmit={handleSubmit} className="p-10 space-y-5 max-h-[72vh] overflow-y-auto no-scrollbar">
                            <div className="grid grid-cols-2 gap-5">
                                <div className="space-y-2">
                                    <label className="text-[11px] font-black text-slate-400 uppercase tracking-widest px-1">客戶名 *</label>
                                    <input required list="cl-list" type="text" className="w-full px-5 py-3.5 bg-slate-50 border border-slate-200 rounded-2xl focus:ring-4 focus:ring-indigo-100 outline-none font-semibold text-sm" placeholder="輸入或選擇客戶…" value={form.client} onChange={e => setForm({...form, client: e.target.value})}/>
                                    <datalist id="cl-list">{uniqueClients.map(c => <option key={c} value={c}/>)}</datalist>
                                </div>
                                <div className="space-y-2">
                                    <label className="text-[11px] font-black text-slate-400 uppercase tracking-widest px-1">專案名 *</label>
                                    <input required list="pj-list" type="text" className="w-full px-5 py-3.5 bg-slate-50 border border-slate-200 rounded-2xl focus:ring-4 focus:ring-indigo-100 outline-none font-semibold text-sm" placeholder="輸入或選擇專案…" value={form.project} onChange={e => setForm({...form, project: e.target.value})}/>
                                    <datalist id="pj-list">{uniqueProjects.map(p => <option key={p} value={p}/>)}</datalist>
                                </div>
                            </div>
                            <div className="space-y-2">
                                <label className="text-[11px] font-black text-slate-400 uppercase tracking-widest px-1">工作內容 *</label>
                                <textarea required rows="2" className="w-full px-5 py-3.5 bg-slate-50 border border-slate-200 rounded-2xl focus:ring-4 focus:ring-indigo-100 outline-none resize-none text-sm font-semibold" placeholder="簡述此任務內容…" value={form.task} onChange={e => setForm({...form, task: e.target.value})}></textarea>
                            </div>
                            <div className="grid grid-cols-2 gap-5">
                                <div className="space-y-2">
                                    <label className="text-[11px] font-black text-slate-400 uppercase tracking-widest px-1">指派時間 *</label>
                                    <input required type="date" className="w-full px-5 py-3.5 bg-slate-50 border border-slate-200 rounded-2xl focus:ring-4 focus:ring-indigo-100 outline-none font-semibold text-sm" value={form.assignedDate} onChange={e => setForm({...form, assignedDate: e.target.value})}/>
                                </div>
                                <div className="space-y-2">
                                    <label className="text-[11px] font-black text-slate-400 uppercase tracking-widest px-1">負責人員</label>
                                    <input list="ow-list" type="text" className="w-full px-5 py-3.5 bg-slate-50 border border-slate-100 rounded-2xl focus:ring-4 focus:ring-indigo-100 outline-none font-semibold text-sm" placeholder="負責人…" value={form.owner} onChange={e => setForm({...form, owner: e.target.value})}/>
                                    <datalist id="ow-list">{uniqueOwners.map(o => <option key={o} value={o}/>)}</datalist>
                                </div>
                            </div>
                            <div className="grid grid-cols-2 gap-5">
                                <div className="space-y-2">
                                    <label className="text-[11px] font-black text-slate-400 uppercase tracking-widest px-1">Task 狀態</label>
                                    <select className="w-full px-5 py-3.5 bg-slate-50 border border-slate-200 rounded-2xl focus:ring-4 focus:ring-indigo-100 outline-none font-semibold text-sm" value={form.status} onChange={e => setForm({...form, status: e.target.value})}>
                                        {Object.keys(STATUS_OPTIONS).map(s => <option key={s} value={s}>{s}</option>)}
                                    </select>
                                </div>
                                <div className="space-y-2">
                                    <label className="text-[11px] font-black text-slate-400 uppercase tracking-widest px-1">預計結束時間 *</label>
                                    <input required type="date" className="w-full px-5 py-3.5 bg-slate-50 border border-slate-200 rounded-2xl focus:ring-4 focus:ring-indigo-100 outline-none font-semibold text-sm" value={form.dueDate} onChange={e => setForm({...form, dueDate: e.target.value})}/>
                                </div>
                            </div>
                            <div className="space-y-2">
                                <label className="text-[11px] font-black text-slate-400 uppercase tracking-widest px-1 flex items-center justify-between">
                                    <span className="flex items-center gap-1.5"><Icon name="file-text" size={12} className="text-indigo-500"/>備註</span>
                                    <button type="button" onClick={() => attachmentRef.current.click()} className="text-indigo-600 bg-indigo-50 hover:bg-indigo-100 px-3 py-1 rounded-lg text-[10px] font-black flex items-center gap-1">
                                        <Icon name="upload-cloud" size={12}/> 附加檔案（上限 500KB）
                                    </button>
                                </label>
                                <textarea rows="3" className="w-full px-5 py-3.5 bg-slate-50 border border-slate-200 rounded-2xl focus:ring-4 focus:ring-indigo-100 outline-none resize-none text-sm font-medium leading-relaxed" placeholder="備註說明…" value={form.remarks} onChange={e => setForm({...form, remarks: e.target.value})}></textarea>
                                <input type="file" ref={attachmentRef} onChange={handleFileUpload} className="hidden"/>
                                {form.files && form.files.length > 0 && (
                                    <div className="space-y-2 mt-1">
                                        {form.files.map(f => (
                                            <div key={f.id} className="flex items-center justify-between bg-slate-50 border border-slate-100 px-3 py-2 rounded-xl">
                                                <div className="flex items-center gap-2 truncate">
                                                    <Icon name="file" size={14} className="text-slate-400"/>
                                                    <span className="text-xs text-slate-600 font-semibold truncate">{f.name}</span>
                                                    <span className="text-[9px] text-slate-400">({(f.size/1024).toFixed(1)} KB)</span>
                                                </div>
                                                <button type="button" onClick={() => setForm(prev => ({...prev, files: prev.files.filter(x => x.id !== f.id)}))} className="text-slate-300 hover:text-rose-500 p-1"><Icon name="x-circle" size={16}/></button>
                                            </div>
                                        ))}
                                    </div>
                                )}
                            </div>
                            <div className="pt-6 flex gap-4">
                                <button type="button" onClick={() => { setIsModalOpen(false); setEditingId(null); setForm(initialForm); }} className="flex-1 px-6 py-4 border border-slate-200 text-slate-500 rounded-2xl font-bold hover:bg-slate-50 transition-all text-sm">取消</button>
                                <button type="submit" className="flex-1 px-6 py-4 bg-indigo-600 text-white rounded-2xl font-bold hover:bg-indigo-700 transition-all shadow-xl shadow-indigo-200 text-sm">
                                    {editingId ? '更新任務' : '儲存任務'}
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            )}
        </div>
    );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
